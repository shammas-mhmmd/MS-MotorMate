<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Firebase Auth Test</title>
</head>
<body>

<h2>Firebase Auth Test</h2>

<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>

<button type="button" onclick="register()">Create Account</button>
<button type="button" onclick="login()">Login</button>

<p id="msg"></p>

<script type="module">
  console.log("🔥 Firebase test loaded");

  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "PASTE_REAL_KEY",
    authDomain: "PASTE_REAL_DOMAIN",
    projectId: "PASTE_REAL_PROJECT_ID",
    storageBucket: "PASTE_REAL_BUCKET",
    messagingSenderId: "PASTE_REAL_ID",
    appId: "PASTE_REAL_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  window.register = function () {
    createUserWithEmailAndPassword(auth, email.value, password.value)
      .then(() => msg.textContent = "✅ Account created")
      .catch(e => msg.textContent = "❌ " + e.message);
  };

  window.login = function () {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .then(() => msg.textContent = "✅ Login success")
      .catch(e => msg.textContent = "❌ " + e.message);
  };
</script>

</body>
</html>
